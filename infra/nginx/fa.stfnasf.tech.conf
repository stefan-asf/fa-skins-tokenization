server {
    listen 80;
    server_name fa.stfnasf.tech;
    # certbot добавит redirect на https
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name fa.stfnasf.tech;

    # SSL — certbot заполнит эти строки автоматически
    ssl_certificate     /etc/letsencrypt/live/fa.stfnasf.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fa.stfnasf.tech/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # API
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Webhook (GitHub)
    location /webhook {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Frontend (этап 8 — пока заглушка)
    location / {
        root  /var/www/fa-skins-tokenization/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
